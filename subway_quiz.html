<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>지하철 퀴즈</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Apple SD Gothic Neo',sans-serif;background:#f0f2f5;display:flex;justify-content:center;min-height:100vh}
.phone{width:100%;max-width:390px;min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column}

/* ── HEADER ── */
.hdr{padding:16px 20px 12px;background:#fff;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee}
.hdr-title{font-size:17px;font-weight:700;color:#111}
.hdr-stage{font-size:11px;color:#aaa}
.lives{display:flex;gap:3px}
.score-display{font-size:20px;font-weight:800;color:#111}

/* ── AD ── */
.ad-banner{height:50px;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ad-banner span{font-size:11px;color:#ccc;letter-spacing:.1em}

/* ── SCREENS ── */
.screen{flex:1;display:none;flex-direction:column;overflow-y:auto}
.screen.active{display:flex}

/* ── HOME ── */
.home-hero{background:#fff;padding:28px 24px 24px;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;pointer-events:none}
.hero-text{position:relative;z-index:1}
.hero-icon{font-size:14px;font-weight:700;color:#555;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.hero-title{font-size:26px;font-weight:900;color:#111;letter-spacing:-1px;margin-bottom:6px}
.hero-sub{font-size:13px;color:#888;line-height:1.6}

.home-stats{display:flex;gap:8px;padding:14px 16px;background:#fff;border-top:1px solid #f0f0f0}
.stat-chip{flex:1;background:#f7f8fa;border-radius:12px;padding:10px 8px;text-align:center}
.stat-chip .sv{font-size:18px;font-weight:800;color:#111}
.stat-chip .sl{font-size:10px;color:#aaa;margin-top:2px}

.daily-wrap{padding:14px 16px 0}
.daily-card{border-radius:18px;padding:18px 20px;position:relative;overflow:hidden;cursor:pointer;transition:transform .1s}
.daily-card:active{transform:scale(.98)}
.daily-card.done{opacity:.7;cursor:default}
.daily-card.done:active{transform:none}
.dc-label{font-size:10px;font-weight:700;letter-spacing:.1em;margin-bottom:6px;opacity:.8}
.dc-title{font-size:19px;font-weight:800;color:#fff;margin-bottom:3px}
.dc-sub{font-size:12px;color:rgba(255,255,255,.7)}
.dc-badge{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.25);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;border:1px solid rgba(255,255,255,.3)}
.dc-row{display:flex;gap:6px;margin-top:12px}
.dc-chip{background:rgba(255,255,255,.2);color:rgba(255,255,255,.9);font-size:11px;padding:4px 10px;border-radius:99px}

.stage-wrap{padding:14px 16px 24px}
.section-label{font-size:11px;font-weight:700;color:#aaa;letter-spacing:.06em;margin-bottom:10px}
.stage-list{display:flex;flex-direction:column;gap:8px}
.stage-card{border-radius:16px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s;background:#fff;border:1.5px solid transparent}
.stage-card:active{transform:scale(.98)}
.stage-card.locked{opacity:.4;cursor:default}
.stage-card.locked:active{transform:none}
.sc-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sc-info{flex:1}
.sc-name{font-size:14px;font-weight:700;margin-bottom:2px}
.sc-desc{font-size:12px;opacity:.6}
.sc-stars{font-size:13px}
.s1{border-color:#C8E6C9}.s1 .sc-icon{background:#E8F5E9}.s1 .sc-name{color:#2E7D32}
.s2{border-color:#BBDEFB}.s2 .sc-icon{background:#E3F2FD}.s2 .sc-name{color:#1565C0}
.s3{border-color:#FFE0B2}.s3 .sc-icon{background:#FFF3E0}.s3 .sc-name{color:#E65100}
.sb{border-color:#F8BBD0}.sb .sc-icon{background:#FCE4EC}.sb .sc-name{color:#880E4F}

/* ── QUIZ ── */
.quiz-progress{padding:12px 16px 8px;background:#fff;border-bottom:1px solid #f0f0f0}
.prog-bar{height:5px;background:#f0f0f0;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}
.prog-info{display:flex;justify-content:space-between;margin-top:5px;font-size:11px;color:#bbb}

.quiz-body{padding:14px 16px;flex:1;display:flex;flex-direction:column}

.quiz-type-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:5px 12px;border-radius:99px;margin-bottom:12px}
.badge-a{background:#E3F2FD;color:#1565C0}
.badge-b{background:#FFF8E1;color:#F57F17}

/* 노선 인디케이터 */
.line-indicator{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.line-pill{display:flex;align-items:center;gap:6px;padding:6px 12px 6px 6px;border-radius:99px;border:1.5px solid}
.line-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;flex-shrink:0}
.line-name{font-size:13px;font-weight:700}

/* 문제 카드 — 심플 */
.question-card{border-radius:18px;padding:20px;margin-bottom:14px;background:#fff;border:1.5px solid}
.q-label{font-size:11px;font-weight:600;letter-spacing:.05em;margin-bottom:10px}
.q-station{font-size:30px;font-weight:900;color:#111;letter-spacing:-1.5px;line-height:1.1}

/* 미니맵 */
.mini-map{margin-top:14px;padding-top:14px;border-top:1px solid #f0f0f0}
.mm-track{display:flex;align-items:center;gap:0}
.mm-stop{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:56px;max-width:72px}
.mm-label{font-size:9px;font-weight:600;color:#aaa;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
.mm-label.cur{font-weight:800;color:#333}
.mm-dot{width:9px;height:9px;border-radius:50%;background:#ddd;flex-shrink:0}
.mm-dot.cur{width:13px;height:13px}
.mm-seg{height:3px;flex:1;min-width:12px;border-radius:2px;background:#ddd;margin-bottom:6px}

/* 선택지 */
.options{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:4px}
.opt-btn{padding:16px 10px;border-radius:14px;border:1.5px solid #eee;background:#fff;font-size:14px;font-weight:700;color:#222;text-align:center;cursor:pointer;transition:all .12s;min-height:68px;display:flex;align-items:center;justify-content:center;line-height:1.3;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.opt-btn:active{transform:scale(.96)}
.opt-btn.eliminated{opacity:.2;pointer-events:none;text-decoration:line-through}
.opt-btn.correct{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32}
.opt-btn.wrong{background:#FFEBEE;border-color:#EF5350;color:#C62828}

/* 초성 */
.chosung-box{background:#fff;border:1.5px solid #e8e8e8;border-radius:16px;padding:16px 20px;text-align:center;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.chosung-text{font-size:30px;font-weight:800;letter-spacing:10px;color:#222}
.chosung-hint{font-size:12px;color:#bbb;margin-top:4px}
.chosung-input-wrap{display:flex;flex-direction:column;gap:10px}
.chosung-input{width:100%;padding:14px;border-radius:14px;border:1.5px solid #e0e0e0;background:#fff;font-size:18px;font-weight:700;text-align:center;color:#111;outline:none;transition:border-color .2s}
.chosung-input:focus{border-color:#2196F3}
.chosung-input.correct{border-color:#4CAF50;background:#E8F5E9;color:#2E7D32}
.chosung-input.wrong{border-color:#EF5350;background:#FFEBEE;color:#C62828}
.submit-btn{padding:14px;border-radius:14px;background:#111;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer}
.submit-btn:disabled{background:#ddd;color:#999;cursor:default}

/* 힌트 */
.hint-bar{display:flex;align-items:center;justify-content:flex-end;margin-bottom:10px;gap:8px}
.hint-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:99px;border:1.5px solid #FFB300;background:#FFF8E1;color:#F57F17;font-size:12px;font-weight:700;cursor:pointer}
.hint-btn.disabled{opacity:.35;cursor:default;pointer-events:none}
.hint-ad-btn{padding:7px 14px;border-radius:99px;border:1.5px solid #ddd;background:#f5f5f5;color:#888;font-size:12px;font-weight:600;cursor:pointer}

.feedback{text-align:center;padding:10px 0;font-size:14px;font-weight:700;min-height:24px}
.feedback.correct{color:#4CAF50}
.feedback.wrong{color:#EF5350}

/* ── RESULT ── */
.result-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center;background:#f0f2f5}
.result-emoji{font-size:64px;margin-bottom:16px}
.result-title{font-size:24px;font-weight:800;color:#111;margin-bottom:8px}
.result-sub{font-size:14px;color:#888;margin-bottom:24px;line-height:1.7;white-space:pre-line}
.result-score{font-size:48px;font-weight:900;color:#111;margin-bottom:4px;letter-spacing:-2px}
.result-score-label{font-size:12px;color:#bbb;margin-bottom:20px}
.stars-display{font-size:36px;letter-spacing:4px;margin-bottom:28px}
.result-btns{display:flex;flex-direction:column;gap:10px;width:100%}
.btn-primary{padding:15px;border-radius:16px;background:#111;color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer}
.btn-secondary{padding:15px;border-radius:16px;background:#fff;color:#555;font-size:15px;font-weight:600;border:1.5px solid #e8e8e8;cursor:pointer}
.daily-result-badge{background:#EDE7F6;color:#5E35B1;font-size:12px;font-weight:700;padding:6px 16px;border-radius:99px;margin-bottom:18px;display:inline-block}

.combo-badge{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#FF6F00;color:#fff;padding:7px 18px;border-radius:99px;font-size:13px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99}
.combo-badge.show{opacity:1}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:100;white-space:nowrap}
.toast.show{opacity:1}
.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#f0f2f5}
.loading-wrap p{font-size:15px;color:#aaa}
.spinner{width:32px;height:32px;border:3px solid #eee;border-top-color:#2196F3;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="phone">
  <div class="combo-badge" id="comboBadge">🔥 콤보!</div>
  <div class="toast" id="toast"></div>

  <div class="screen active" id="screenHome">
    <div class="loading-wrap">
      <div style="font-size:48px">🚇</div>
      <div class="spinner"></div>
      <p>역 데이터 불러오는 중...</p>
    </div>
  </div>

  <div class="screen" id="screenQuiz">
    <div class="hdr">
      <div>
        <div class="hdr-title" id="quizStageName"></div>
        <div class="hdr-stage" id="quizStageDesc"></div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="lives" id="livesDisplay"></div>
        <div class="score-display" id="quizScore">0</div>
      </div>
    </div>
    <div class="quiz-progress">
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-info"><span id="progText">1/5</span><span id="progCorrect">정답 0</span></div>
    </div>
    <div class="quiz-body" id="quizBody"></div>
    <div class="ad-banner"><span>AD BANNER</span></div>
  </div>

  <div class="screen" id="screenResult">
    <div class="result-wrap" id="resultWrap"></div>
    <div class="ad-banner"><span>AD BANNER</span></div>
  </div>
</div>

<script>
const LINES={
  '1':{name:'1호선',color:'#0052A4'},'2':{name:'2호선',color:'#00A84D'},
  '3':{name:'3호선',color:'#EF7C1C'},'4':{name:'4호선',color:'#00A5DE'},
  '5':{name:'5호선',color:'#996CAC'},'6':{name:'6호선',color:'#CD7C2F'},
  '7':{name:'7호선',color:'#747F00'},'8':{name:'8호선',color:'#E6186C'},
  '9':{name:'9호선',color:'#BDB092'},'A':{name:'공항철도',color:'#0065B3'},
  'B':{name:'경의중앙선',color:'#77C4A3'},'C':{name:'경춘선',color:'#178C72'},
  'D':{name:'분당선',color:'#F5A200'},'E':{name:'신분당선',color:'#D4003B'},
  'G':{name:'경강선',color:'#003DA5'},
};
const FALLBACK=[
  ['1','서울역','남영','시청'],['1','종각','시청','종로3가'],['1','동대문','종로5가','신설동'],
  ['2','강남','역삼','삼성'],['2','홍대입구','합정','신촌'],['2','잠실','잠실나루','잠실새내'],
  ['3','경복궁','독립문','안국'],['3','교대','고속터미널','남부터미널'],
  ['4','명동','충무로','회현'],['4','혜화','한성대입구','동대문'],
  ['5','광화문','서대문','종로3가'],['5','여의도','여의나루','신길'],
  ['6','이태원','녹사평','한강진'],['7','강남구청','청담','학동'],
  ['8','잠실','몽촌토성','석촌'],['9','여의도','국회의사당','샛강'],
];
const STAGES=[
  {id:1,name:'입문',desc:'주요 노선 · 5문제',icon:'🌱',cls:'s1',color:'#4CAF50',qCount:5,passRate:.6,lines:['2','3','4']},
  {id:2,name:'숙련',desc:'혼합 출제 · 7문제',icon:'🚀',cls:'s2',color:'#2196F3',qCount:7,passRate:.65,lines:['1','2','3','4','5']},
  {id:3,name:'마스터',desc:'전 노선 · 10문제',icon:'⭐',cls:'s3',color:'#FF9800',qCount:10,passRate:.7,lines:['1','2','3','4','5','6','7','8','9']},
  {id:4,name:'도전',desc:'광역 포함 · 10문제',icon:'🔥',cls:'sb',color:'#E91E63',qCount:10,passRate:.7,lines:['1','2','3','4','5','6','7','8','9','A','B','C','D','E','G'],bonusStage:true},
];
const DAILY_STAGE={id:'daily',name:'데일리 챌린지',desc:'오늘의 5문제',color:'#7F77DD',qCount:5,passRate:.6,lines:['1','2','3','4','5','6','7','8','9'],isDaily:true};

const S={
  clearedStages:JSON.parse(localStorage.getItem('cS')||'[]'),
  stageStars:JSON.parse(localStorage.getItem('sS')||'{}'),
  totalScore:parseInt(localStorage.getItem('tS')||'0'),
  dailyDate:localStorage.getItem('dD')||'',
  dailyDone:localStorage.getItem('dDone')==='1',
  dailyScore:parseInt(localStorage.getItem('dScore')||'0'),
  hintCount:parseInt(localStorage.getItem('hC')||'3'),
  hintDate:localStorage.getItem('hDate')||'',
  currentStage:null,questions:[],qIndex:0,correct:0,score:0,combo:0,lives:3,answered:false,
};
let STATIONS=[];

function today(){return new Date().toISOString().slice(0,10);}
function save(){
  localStorage.setItem('cS',JSON.stringify(S.clearedStages));
  localStorage.setItem('sS',JSON.stringify(S.stageStars));
  localStorage.setItem('tS',S.totalScore);
  localStorage.setItem('dD',S.dailyDate);
  localStorage.setItem('dDone',S.dailyDone?'1':'0');
  localStorage.setItem('dScore',S.dailyScore);
  localStorage.setItem('hC',S.hintCount);
  localStorage.setItem('hDate',S.hintDate);
}
function checkHintReset(){if(S.hintDate!==today()){S.hintCount=3;S.hintDate=today();save();}}

async function loadStations(){
  try{const res=await fetch('stations.json');const data=await res.json();STATIONS=data.filter(s=>s[3]!=='-');}
  catch(e){STATIONS=[...FALLBACK];}
}

function shuffle(a){return[...a].sort(()=>Math.random()-.5);}
function pick(a,n){return shuffle(a).slice(0,n);}
function seededRand(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280;};}
function seededShuffle(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getChosung(str){
  const CHO=['ㄱ','ㄲ','ㄴ','ㄷ','ㄸ','ㄹ','ㅁ','ㅂ','ㅃ','ㅅ','ㅆ','ㅇ','ㅈ','ㅉ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ'];
  return[...str].map(c=>{const code=c.charCodeAt(0)-0xAC00;if(code<0||code>11171)return c;return CHO[Math.floor(code/28/21)];}).join('');
}

function generateQuestions(stage,dateStr){
  const pool=STATIONS.filter(s=>stage.lines.includes(s[0])&&s[3]!=='-');
  let selected;
  if(dateStr){const seed=parseInt(dateStr.replace(/-/g,''))%233280;selected=seededShuffle(pool,seededRand(seed)).slice(0,stage.qCount);}
  else{selected=pick(pool,stage.qCount);}
  const cr=stage.bonusStage?.6:(stage.id===1?.2:.4);
  return selected.map(s=>{
    if(Math.random()<cr)return{type:'B',line:s[0],station:s[1],chosung:getChosung(s[1]),prev:s[2],next:s[3]};
    // 정답 = 현재 역 이름, 미니맵은 prev — ? — next
    const answer=s[1];
    const wrongs=pick(pool.filter(x=>x[1]!==answer),3).map(x=>x[1]);
    return{type:'A',line:s[0],station:s[1],answer,options:shuffle([answer,...wrongs]),prev:s[2],next:s[3]};
  });
}

function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}

// ── 미니맵 ──
function miniMap(lineKey,cur,prev,next,color){
  const stops=[
    {label:prev||'출발역',isCur:false,isPrev:true},
    {label:'?',isCur:true,isPrev:false},
    {label:next||'종착역',isCur:false,isPrev:false},
  ];
  const html=stops.map((s,i)=>{
    const dotColor=s.isCur?color:'#ddd';
    const borderColor=s.isCur?color:'#ddd';
    return`<div class="mm-stop" style="min-width:${s.isCur?'72px':'56px'}">
      <div class="mm-label" style="color:${s.isCur?color:'#aaa'};font-weight:${s.isCur?'900':'500'};font-size:${s.isCur?'18px':'11px'}">${s.label}</div>
      <div class="mm-dot${s.isCur?' cur':''}"
        style="background:${dotColor};border:2px solid ${borderColor};${s.isCur?`box-shadow:0 0 0 4px ${color}25`:''}"></div>
    </div>${i<stops.length-1?`<div class="mm-seg" style="background:${color}44;margin-bottom:6px"></div>`:''}`;
  }).join('');
  return`<div class="mini-map"><div class="mm-track" style="justify-content:center">${html}</div></div>`;
}

// ── 홈 ──
function renderHome(){
  const el=document.getElementById('screenHome');
  const isDone=S.dailyDone&&S.dailyDate===today();
  el.innerHTML=`
    <div class="home-hero">
      <svg class="hero-bg" viewBox="0 0 390 140" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
        <path d="M0 80 Q60 60 130 75 Q200 90 270 65 L390 55" stroke="#0052A4" stroke-width="2.5" fill="none" opacity=".12"/>
        <path d="M0 100 Q80 80 170 95 Q260 110 390 85" stroke="#00A84D" stroke-width="2" fill="none" opacity=".1"/>
        <path d="M0 115 Q100 100 200 112 Q300 124 390 105" stroke="#EF7C1C" stroke-width="1.5" fill="none" opacity=".08"/>
        <circle cx="130" cy="75" r="5" fill="#0052A4" opacity=".2"/>
        <circle cx="270" cy="65" r="5" fill="#0052A4" opacity=".2"/>
        <circle cx="170" cy="95" r="4" fill="#00A84D" opacity=".18"/>
        <circle cx="50" cy="84" r="3" fill="#0052A4" opacity=".15"/>
        <circle cx="320" cy="88" r="3" fill="#00A84D" opacity=".15"/>
      </svg>
      <div class="hero-text">
        <div class="hero-icon">🚇 지하철 퀴즈</div>
        <div class="hero-title">노선도 마스터</div>
        <div class="hero-sub">수도권 ${STATIONS.length}개 역 · 얼마나 알고 있나요?</div>
      </div>
    </div>
    <div class="home-stats">
      <div class="stat-chip"><div class="sv">${S.totalScore.toLocaleString()}</div><div class="sl">총 점수</div></div>
      <div class="stat-chip"><div class="sv">${S.clearedStages.length}/4</div><div class="sl">스테이지</div></div>
      <div class="stat-chip"><div class="sv">💡 ${S.hintCount}</div><div class="sl">힌트</div></div>
    </div>
    <div class="daily-wrap">
      <div class="daily-card${isDone?' done':''}" onclick="${isDone?'':'startDaily()'}"
        style="background:linear-gradient(135deg,#3949AB,#00ACC1)">
        <div class="dc-label" style="color:rgba(255,255,255,.8)">TODAY'S CHALLENGE</div>
        <div class="dc-title">📅 데일리 챌린지</div>
        <div class="dc-sub">${isDone?'오늘은 이미 완료했어요':'매일 새로운 5문제 · 오늘만 도전 가능'}</div>
        <div class="dc-row">
          <div class="dc-chip">💡 힌트 ${S.hintCount}개</div>
          <div class="dc-chip">${today()}</div>
        </div>
        ${isDone?`<div class="dc-badge">✓ ${S.dailyScore.toLocaleString()}점</div>`:''}
      </div>
    </div>
    <div class="stage-wrap">
      <div class="section-label">STAGES</div>
      <div class="stage-list" id="stageList"></div>
    </div>
    <div class="ad-banner"><span>AD BANNER</span></div>`;

  STAGES.forEach((stage,idx)=>{
    const unlocked=idx===0||S.clearedStages.includes(idx);
    const stars=S.stageStars[stage.id]||0;
    const card=document.createElement('div');
    card.className=`stage-card ${stage.cls}${!unlocked?' locked':''}`;
    card.innerHTML=`
      <div class="sc-icon">${stage.icon}</div>
      <div class="sc-info">
        <div class="sc-name">Stage ${stage.id} · ${stage.name}</div>
        <div class="sc-desc">${stage.desc}</div>
      </div>
      <div>${!unlocked?'🔒':`<div class="sc-stars">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>`}</div>`;
    if(unlocked)card.onclick=()=>startStage(stage);
    document.getElementById('stageList').appendChild(card);
  });
  showScreen('screenHome');
}

function startDaily(){
  S.currentStage={...DAILY_STAGE};S.questions=generateQuestions(DAILY_STAGE,today());
  S.qIndex=0;S.correct=0;S.score=0;S.combo=0;S.lives=3;S.answered=false;
  document.getElementById('quizStageName').textContent='📅 데일리 챌린지';
  document.getElementById('quizStageDesc').textContent=today()+' · 5문제';
  document.getElementById('progFill').style.background=DAILY_STAGE.color;
  showScreen('screenQuiz');renderQuestion();
}
function startStage(stage){
  S.currentStage=stage;S.questions=generateQuestions(stage);
  S.qIndex=0;S.correct=0;S.score=0;S.combo=0;S.lives=3;S.answered=false;
  document.getElementById('quizStageName').textContent=`Stage ${stage.id} · ${stage.name}`;
  document.getElementById('quizStageDesc').textContent=stage.desc;
  document.getElementById('progFill').style.background=stage.color;
  showScreen('screenQuiz');renderQuestion();
}

function renderQuestion(){
  const q=S.questions[S.qIndex];
  const total=S.questions.length;
  S.answered=false;
  document.getElementById('progFill').style.width=(S.qIndex/total*100)+'%';
  document.getElementById('progText').textContent=`${S.qIndex+1}/${total}`;
  document.getElementById('progCorrect').textContent=`정답 ${S.correct}`;
  document.getElementById('quizScore').textContent=S.score.toLocaleString();
  document.getElementById('livesDisplay').innerHTML=Array.from({length:3},(_,i)=>`<span class="heart">${i<S.lives?'❤️':'🖤'}</span>`).join('');

  const line=LINES[q.line]||{name:q.line+'호선',color:'#888'};
  const lc=line.color;
  const hintDisabled=S.hintCount<=0||q.type==='B';
  const hintBar=`
    <div class="hint-bar">
      <span style="font-size:12px;color:#bbb">💡 ${S.hintCount}개 남음</span>
      <button class="hint-btn${hintDisabled?' disabled':''}" onclick="useHint()">💡 힌트 사용</button>
      ${S.hintCount===0?`<button class="hint-ad-btn" onclick="watchAd()">📺 광고 보고 충전</button>`:''}
    </div>`;

  const body=document.getElementById('quizBody');
  if(q.type==='A'){
    body.innerHTML=`
      <div class="quiz-type-badge badge-a">🔵 다음 역 맞추기</div>
      <div class="line-indicator">
        <div class="line-pill" style="background:${lc}12;border-color:${lc}40">
          <div class="line-dot" style="background:${lc}">${q.line}</div>
          <div class="line-name" style="color:${lc}">${line.name}</div>
        </div>
      </div>
      <div class="question-card" style="border-color:${lc}30;background:#fff">
        <div class="q-label" style="color:${lc}">가운데 역은?</div>
        ${miniMap(q.line,q.station,q.prev,q.next,lc)}
      </div>
      ${hintBar}
      <div class="options" id="options">
        ${q.options.map(opt=>`
          <button class="opt-btn" onclick="answerA('${opt}',this)" data-val="${opt}">${opt}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>`;
  }else{
    body.innerHTML=`
      <div class="quiz-type-badge badge-b">🟡 초성 퀴즈</div>
      <div class="line-indicator">
        <div class="line-pill" style="background:${lc}12;border-color:${lc}40">
          <div class="line-dot" style="background:${lc}">${q.line}</div>
          <div class="line-name" style="color:${lc}">${line.name}</div>
        </div>
      </div>
      <div class="question-card" style="border-color:${lc}30;background:#fff">
        <div class="q-label" style="color:${lc}">이 역의 이름은?</div>
        <div class="q-station" style="font-size:18px;color:#888">${line.name} 소속 역</div>
        ${miniMap(q.line,q.station,q.prev,q.next,lc)}
      </div>
      <div class="chosung-box">
        <div class="chosung-text">${q.chosung}</div>
        <div class="chosung-hint">초성을 보고 역이름을 입력하세요</div>
      </div>
      <div class="chosung-input-wrap">
        <input class="chosung-input" id="chosungInput" placeholder="역이름 입력..." maxlength="12"
          onkeydown="if(event.key==='Enter')submitChosung()"/>
        <button class="submit-btn" id="submitBtn" onclick="submitChosung()">확인</button>
      </div>
      <div class="feedback" id="feedback"></div>`;
    setTimeout(()=>document.getElementById('chosungInput')?.focus(),100);
  }
}

function useHint(){
  const q=S.questions[S.qIndex];
  if(S.hintCount<=0||S.answered||q.type==='B')return;
  const btns=[...document.querySelectorAll('.opt-btn:not(.eliminated)')];
  const wrongs=btns.filter(b=>b.dataset.val!==q.answer);
  if(!wrongs.length)return;
  pick(wrongs,Math.min(2,wrongs.length)).forEach(b=>b.classList.add('eliminated'));
  S.hintCount--;save();
  document.querySelector('.hint-btn').textContent=`💡 힌트 (${S.hintCount}개)`;
  if(S.hintCount<=0)document.querySelector('.hint-btn').classList.add('disabled');
  showToast('오답 2개를 제거했어요!');
}
function watchAd(){showToast('📺 광고 완료! 힌트 +2개');S.hintCount=Math.min(S.hintCount+2,5);save();renderQuestion();}

function answerA(val,btn){
  if(S.answered)return;S.answered=true;
  const q=S.questions[S.qIndex];
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.onclick=null;
    if(b.dataset.val===q.answer)b.classList.add('correct');
    else if(b===btn&&val!==q.answer)b.classList.add('wrong');
  });
  handleResult(val===q.answer);
}
function submitChosung(){
  if(S.answered)return;
  const input=document.getElementById('chosungInput');
  const val=input.value.trim();if(!val)return;
  S.answered=true;const q=S.questions[S.qIndex];
  const correct=val===q.station;
  input.classList.add(correct?'correct':'wrong');
  input.disabled=true;document.getElementById('submitBtn').disabled=true;
  if(!correct)input.value=`${val} → 정답: ${q.station}`;
  handleResult(correct);
}

function handleResult(correct){
  const fb=document.getElementById('feedback');
  if(correct){
    S.correct++;S.combo++;
    const bonus=Math.min(S.combo*10,50);const gained=100+bonus;
    S.score+=gained;S.totalScore+=gained;save();
    fb.className='feedback correct';
    fb.textContent=S.combo>=2?`🔥 ${S.combo}콤보! +${gained}점`:`✅ 정답! +${gained}점`;
    if(S.combo>=2)showCombo(S.combo);
  }else{
    S.combo=0;S.lives--;
    fb.className='feedback wrong';fb.textContent='❌ 틀렸어요';
    document.getElementById('livesDisplay').innerHTML=Array.from({length:3},(_,i)=>`<span class="heart">${i<S.lives?'❤️':'🖤'}</span>`).join('');
  }
  document.getElementById('quizScore').textContent=S.score.toLocaleString();
  setTimeout(()=>{
    if(S.lives<=0){showResult();return;}
    S.qIndex+1>=S.questions.length?showResult():(S.qIndex++,renderQuestion());
  },correct?900:1400);
}

function showResult(){
  const stage=S.currentStage;const total=S.questions.length;
  const rate=S.correct/total;const passed=rate>=stage.passRate;
  let stars=0;if(rate>=1.0)stars=3;else if(rate>=.8)stars=2;else if(rate>=stage.passRate)stars=1;
  if(stage.isDaily){S.dailyDate=today();S.dailyDone=true;S.dailyScore=S.score;save();}
  else if(passed){
    if(!S.clearedStages.includes(stage.id))S.clearedStages.push(stage.id);
    if((S.stageStars[stage.id]||0)<stars)S.stageStars[stage.id]=stars;save();
  }
  const emoji=stars===3?'🏆':stars===2?'🎉':stars===1?'👍':'😢';
  document.getElementById('resultWrap').innerHTML=`
    <div class="result-emoji">${emoji}</div>
    ${stage.isDaily?'<div class="daily-result-badge">📅 데일리 챌린지</div>':''}
    <div class="result-title">${stage.isDaily?'오늘의 챌린지 완료!':passed?'스테이지 클리어!':'아쉽네요...'}</div>
    <div class="result-sub">${total}문제 중 ${S.correct}문제 정답${!stage.isDaily&&passed?'\n다음 스테이지 해금!':''}</div>
    <div class="result-score">${S.score.toLocaleString()}</div>
    <div class="result-score-label">이번 점수</div>
    <div class="stars-display">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <div class="result-btns">
      ${stage.isDaily?'':`<button class="btn-primary" onclick="startStage(S.currentStage)">다시 도전</button>`}
      <button class="btn-secondary" onclick="renderHome()">홈으로</button>
    </div>`;
  showScreen('screenResult');
}

function showCombo(n){const el=document.getElementById('comboBadge');el.textContent=`🔥 ${n}콤보!`;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1200);}
function showToast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2000);}

async function init(){checkHintReset();await loadStations();renderHome();}
init();
</script>
</body>
</html>
